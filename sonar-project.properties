# SonarQube / SonarCloud — SyntropyLog
# Evita que el deploy se bloquee por falsos positivos donde "password" y similares
# son identificadores legítimos (masking, config, redacción de logs).

sonar.projectKey=syntropylog
sonar.projectName=SyntropyLog

# Fuentes y tests
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.spec.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusiones de archivos: salidas, nativos, y el único archivo con literales sensibles (aliases)
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.d.ts,**/syntropylog-native/**,**/sensitiveKeys.ts

# ——— Ignorar reglas de secrets/password en paths donde es legítimo ———
# En masking y serialization usamos "password", "token", "secret" como nombres
# de estrategias o claves a enmascarar; no son credenciales hardcodeadas.

sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6

# TypeScript S2068 (hardcoded secrets) — masking
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=src/masking/**/*

# JavaScript S2068 — masking
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=src/masking/**/*

# TypeScript S2068 — serialization (sanitización de claves sensibles)
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e3.resourceKey=src/serialization/**/*

# JavaScript S2068 — serialization
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.e4.resourceKey=src/serialization/**/*

# Regla secrets:S2068 (analizador genérico) — masking
sonar.issue.ignore.multicriteria.e5.ruleKey=secrets:S2068
sonar.issue.ignore.multicriteria.e5.resourceKey=src/masking/**/*

# Regla secrets:S2068 — serialization
sonar.issue.ignore.multicriteria.e6.ruleKey=secrets:S2068
sonar.issue.ignore.multicriteria.e6.resourceKey=src/serialization/**/*
