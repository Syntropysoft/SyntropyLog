name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Permisos mínimos para GITHUB_TOKEN (ver https://docs.github.com/es/actions/tutorials/authenticate-with-github_token#modifying-the-permissions-for-the-github_token).
    # Para que el action pueda crear el PR "Version Packages", en el repo debe estar activada la opción
    # Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests".
    permissions:
      contents: write      # push a ramas y crear release (changesets/action)
      pull-requests: write # crear y actualizar el PR "Version Packages" (changesets/action)
      id-token: write      # OIDC para npm provenance

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Flujo: push a main con changesets → crea PR "Version Packages" (version bump en esa rama)
      # y publica a npm desde el runner (por eso npm puede tener 0.9.13 y main seguir en 0.9.12).
      # IMPORTANTE: después de cada release, mergear el PR "Version Packages" para que main
      # tenga la misma versión que npm (package.json + CHANGELOG).
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          title: "Version Packages"
          branch: main
          publish: npm run release
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
