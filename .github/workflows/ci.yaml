# .github/workflows/ci.yml
# Runs on all branches (push) and on PRs targeting main/develop.
# Covers lint, build, test, coverage, and benchmark (native addon). No publish.
name: CI

on:
  push:
  pull_request:
    branches: [ main, develop ]

jobs:
  primary-build:
    name: "Build & Test (Node 20.x)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm run lint

      - name: Build TypeScript
        run: pnpm run build

      - name: Security Audit
        run: pnpm audit --audit-level=high

      - name: Run tests and generate coverage
        run: pnpm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage/
          token: ${{ secrets.CODECOV_TOKEN }}

  test-matrix:
    name: "Test Matrix (Node ${{ matrix.node-version }})"
    needs: primary-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm run build

      - name: Run tests
        run: pnpm run test # No coverage needed here, only confirm tests pass

  # Optional job: build addon, run benchmark, assert native addon is used
  benchmark-native-addon:
    name: "Benchmark (native addon)"
    needs: primary-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: cargo
          cache-target: syntropylog-native/target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native addon
        run: cd syntropylog-native && pnpm run build
        shell: bash

      - name: List built addon artifacts (for debugging)
        run: ls -la syntropylog-native/*.node 2>/dev/null || echo "No .node files in syntropylog-native/"

      - name: Run benchmark and assert native addon in use
        run: |
          # bench:memory uses NODE_OPTIONS=--expose-gc for stable memory numbers
          pnpm run bench:memory 2>&1 | tee bench.log
          if ! grep -q "native addon (Rust): yes" bench.log; then
            echo "Expected 'native addon (Rust): yes' in benchmark output. First lines of bench.log:"
            head -25 bench.log
            echo "--- line with 'native addon' ---"
            grep "native addon" bench.log || true
            exit 1
          fi