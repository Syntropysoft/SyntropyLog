# .github/workflows/ci.yml
name: CI

on:
  push: # Se ejecuta en pushes a cualquier rama
  pull_request:
    branches: [ main, develop ]

jobs:
  primary-build:
    name: "Build & Test (Node 20.x)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm run lint

      - name: Build TypeScript
        run: pnpm run build

      - name: Security Audit
        run: pnpm audit --audit-level=high

      - name: Run tests and generate coverage
        run: pnpm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage/
          token: ${{ secrets.CODECOV_TOKEN }}

  test-matrix:
    name: "Test Matrix (Node ${{ matrix.node-version }})"
    needs: primary-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm run build

      - name: Run tests
        run: pnpm run test # No necesitamos cobertura aquí, solo confirmar que pasan

  # Fase 5.1: optional job — build addon, run benchmark, assert native addon is used
  benchmark-native-addon:
    name: "Benchmark (native addon)"
    needs: primary-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: cargo
          cache-target: syntropylog-native/target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native addon
        run: cd syntropylog-native && pnpm exec napi build --platform --release
        shell: bash

      - name: Run benchmark and assert native addon in use
        run: |
          pnpm run bench 2>&1 | tee bench.log
          grep -q "native addon (Rust): yes" bench.log || (echo "Expected 'native addon (Rust): yes' in benchmark output"; exit 1)