# Build the Rust addon (syntropylog-native) for every supported target.
# Native targets build on their own runner; Linux server targets (arm64 / musl)
# are cross-compiled with zig (via cargo-zigbuild, which napi drives with --zig).
# A final job merges all .node files into one addon package.
name: Build native addon

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Native (built on a matching runner; binary is runnable → tested) ---
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, test: true }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, test: true }
          - { os: macos-latest, target: aarch64-apple-darwin, test: true }
          # --- Cross-compiled (not runnable on the runner → build only) ---
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, zig: true }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, zig: true }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, zig: true }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: cargo
          cache-target: syntropylog-native/target

      - name: Setup zig (cross-compile)
        if: ${{ matrix.zig }}
        uses: mlugg/setup-zig@v1
        with:
          # Pin a tagged stable release. The action's default tracks the latest
          # dev version (e.g. 0.16.0), which isn't on ziglang.org/builds or the
          # mirrors and fails to download (404/503).
          version: 0.15.1

      - name: Install cargo-zigbuild (cross-compile)
        if: ${{ matrix.zig }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild@0.22.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build addon
        shell: bash
        run: |
          cd syntropylog-native
          pnpm exec napi build --platform --release --target ${{ matrix.target }} ${{ matrix.zig && '--zig' || '' }}
          node scripts/patch-index-no-shell.js

      - name: Test addon (native targets only)
        if: ${{ matrix.test }}
        shell: bash
        run: cd syntropylog-native && node test-node.mjs

      - name: Upload addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.target }}
          path: |
            syntropylog-native/*.node
            syntropylog-native/index.js
            syntropylog-native/index.d.ts

  merge:
    name: Merge platform artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all addon artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: addon-*
          path: artifacts
          merge-multiple: true

      - name: Flatten into single addon package
        run: |
          mkdir -p addon-package
          f_js=$(find artifacts -name index.js | head -1)
          f_ts=$(find artifacts -name index.d.ts | head -1)
          [ -n "$f_js" ] && cp "$f_js" addon-package/
          [ -n "$f_ts" ] && cp "$f_ts" addon-package/
          find artifacts -name "*.node" -exec cp {} addon-package/ \;
          echo "Package contents:"
          ls -la addon-package/

      - name: Upload merged addon (all platforms)
        uses: actions/upload-artifact@v4
        with:
          name: syntropylog-native-all-platforms
          path: addon-package
